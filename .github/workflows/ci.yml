name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET 8) - build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true

      - name: Restore
        run: dotnet restore ./TiGarantias.slnx
        working-directory: backend

      - name: Build
        run: dotnet build ./TiGarantias.slnx --configuration Release --no-restore
        working-directory: backend

      - name: Test
        run: dotnet test ./TiGarantias.slnx --configuration Release --no-build --verbosity normal
        working-directory: backend

  frontend:
    name: Frontend (Angular) - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
