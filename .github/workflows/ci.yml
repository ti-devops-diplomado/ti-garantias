name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: CI - validación básica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Mostrar estructura
        run: |
          echo "Estructura del repo:"
          ls -la
          echo "OK"

  backend:
    name: Backend (.NET 8) - build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detectar backend
        id: detect
        shell: bash
        run: |
          if ls backend/*.sln backend/*.slnx backend/**/*.csproj >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Saltar si no existe backend
        if: steps.detect.outputs.exists != 'true'
        run: echo "Backend no existe todavía. Saltando job."

      - name: Setup .NET
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true

      - name: Restore/Build/Test
        if: steps.detect.outputs.exists == 'true'
        working-directory: backend
        shell: bash
        run: |
          if [ -f "TiGarantias.slnx" ]; then
            dotnet restore ./TiGarantias.slnx
            dotnet build ./TiGarantias.slnx -c Release --no-restore
            dotnet test ./TiGarantias.slnx -c Release --no-build --verbosity normal
          elif ls *.sln >/dev/null 2>&1; then
            dotnet restore ./*.sln
            dotnet build ./*.sln -c Release --no-restore
            dotnet test ./*.sln -c Release --no-build --verbosity normal
          else
            dotnet restore
            dotnet build -c Release --no-restore
            dotnet test -c Release --no-build --verbosity normal
          fi

  frontend:
    name: Frontend (Angular) - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detectar frontend
        id: detect
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Saltar si no existe frontend
        if: steps.detect.outputs.exists != 'true'
        run: echo "Frontend no existe todavía. Saltando job."

      - name: Setup Node
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        if: steps.detect.outputs.exists == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        run: npm run build
        working-directory: frontend
