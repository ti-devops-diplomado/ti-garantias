name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: CI - validación básica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Mostrar estructura
        run: |
          echo "Estructura del repo:"
          ls -la
          echo "OK"

  backend:
    name: Backend (.NET 8) - build & test
    runs-on: ubuntu-latest
    if: ${{ hashFiles('backend/*.sln', 'backend/*.slnx', 'backend/**/*.csproj') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
      - name: Restore
        run: |
          if [ -f "TiGarantias.slnx" ]; then dotnet restore ./TiGarantias.slnx; \
          elif ls *.sln >/dev/null 2>&1; then dotnet restore ./*.sln; \
          else dotnet restore; fi
        working-directory: backend
      - name: Build
        run: |
          if [ -f "TiGarantias.slnx" ]; then dotnet build ./TiGarantias.slnx -c Release --no-restore; \
          elif ls *.sln >/dev/null 2>&1; then dotnet build ./*.sln -c Release --no-restore; \
          else dotnet build -c Release --no-restore; fi
        working-directory: backend
      - name: Test
        run: |
          if [ -f "TiGarantias.slnx" ]; then dotnet test ./TiGarantias.slnx -c Release --no-build; \
          elif ls *.sln >/dev/null 2>&1; then dotnet test ./*.sln -c Release --no-build; \
          else dotnet test -c Release --no-build; fi
        working-directory: backend

  frontend:
    name: Frontend (Angular) - build
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
