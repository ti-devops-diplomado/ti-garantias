name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: CI - validación básica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Mostrar estructura
        run: |
          echo "Estructura del repo:"
          ls -la
          echo "OK"

  backend:
    name: Backend (.NET 8) - build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detectar backend
        id: detect
        shell: bash
        run: |
          if ls backend/*.sln backend/*.slnx backend/**/*.csproj >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Saltar si no existe backend
        if: steps.detect.outputs.exists != 'true'
        run: echo "Backend no existe todavía. Saltando job."

      - name: Setup .NET
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true

      - name: Restore API
        if: steps.detect.outputs.exists == 'true'
        working-directory: backend/src/TiGarantias.Api
        shell: bash
        run: dotnet restore TiGarantias.Api.csproj

      - name: Build API
        if: steps.detect.outputs.exists == 'true'
        working-directory: backend/src/TiGarantias.Api
        shell: bash
        run: dotnet build TiGarantias.Api.csproj -c Release --no-restore

      - name: Test backend
        if: steps.detect.outputs.exists == 'true'
        working-directory: backend/tests/TiGarantias.Api.Tests
        shell: bash
        run: dotnet test TiGarantias.Api.Tests.csproj -c Release --verbosity normal

  frontend:
    name: Frontend (Angular) - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detectar frontend
        id: detect
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Saltar si no existe frontend
        if: steps.detect.outputs.exists != 'true'
        run: echo "Frontend no existe todavía. Saltando job."

      - name: Setup Node
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        if: steps.detect.outputs.exists == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        run: npm run build
        working-directory: frontend

  infrastructure:
    name: Terraform - fmt & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init dev
        run: terraform -chdir=infra/terraform/env/dev init -backend=false

      - name: Terraform validate dev
        run: terraform -chdir=infra/terraform/env/dev validate

      - name: Terraform init shared
        run: terraform -chdir=infra/terraform/env/shared init -backend=false

      - name: Terraform validate shared
        run: terraform -chdir=infra/terraform/env/shared validate

      - name: Terraform init test
        run: terraform -chdir=infra/terraform/env/test init -backend=false

      - name: Terraform validate test
        run: terraform -chdir=infra/terraform/env/test validate

      - name: Terraform init prod
        run: terraform -chdir=infra/terraform/env/prod init -backend=false

      - name: Terraform validate prod
        run: terraform -chdir=infra/terraform/env/prod validate
