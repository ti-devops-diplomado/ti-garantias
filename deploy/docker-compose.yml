services:
  db:
    image: postgres:16.4
    container_name: ti-garantias-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ti_garantias_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ti_garantias_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-ti-garantias/backend}:${BACKEND_TAG:-v0.1.0-b538348}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ti-garantias-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Host=db;Port=5432;Database=${POSTGRES_DB:-ti_garantias_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Secret: ${JWT_SECRET:-CambiarEstaClaveTemporal1234567890}
      Jwt__Issuer: ti-garantias
      Jwt__Audience: ti-garantias-clients
      Storage__AttachmentsPath: ${ATTACHMENTS_PATH:-/data/attachments}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-25}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASS:-}
      Smtp__From: ${SMTP_FROM:-no-reply@demo.local}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - attachments_data:${ATTACHMENTS_PATH:-/data/attachments}

  frontend:
    image: ${FRONTEND_IMAGE:-ti-garantias/frontend}:${FRONTEND_TAG:-v0.1.0-b538348}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ti-garantias-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: ${API_BASE_URL:-}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-4200}:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ti-garantias-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend
      - cadvisor

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ti-garantias-cadvisor
    privileged: true
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ti-garantias-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: ti-garantias-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ti-garantias-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    depends_on:
      - loki


  jenkins:
    build:
      context: ..
      dockerfile: deploy/jenkins/Dockerfile
    image: ti-garantias/jenkins-runner:latest
    container_name: ti-garantias-jenkins
    profiles: ["ci"]
    user: root
    ports:
      - "${JENKINS_PORT:-8081}:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  db_data:
  attachments_data:
  grafana_data:
  jenkins_data:
  loki_data:
