<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1780" viewBox="0 0 2000 1780">
  <defs>
    <style>
      .bg { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; rx:12; }
      .lane { stroke:#94a3b8; stroke-width:2; rx:10; }
      .card { fill:#ffffff; stroke:#64748b; stroke-width:1.4; rx:8; }
      .title { font:700 30px Arial,sans-serif; fill:#0f172a; }
      .h2 { font:700 20px Arial,sans-serif; fill:#0f172a; }
      .h3 { font:700 13px Arial,sans-serif; fill:#0f172a; }
      .tx { font:11px Arial,sans-serif; fill:#1f2937; }
      .data { stroke:#1d4ed8; stroke-width:2.4; fill:none; marker-end:url(#arrData); }
      .ctrl { stroke:#0f766e; stroke-width:2.2; stroke-dasharray:7 6; fill:none; marker-end:url(#arrCtrl); }
      .obs { stroke:#7c3aed; stroke-width:2.2; stroke-dasharray:4 4; fill:none; marker-end:url(#arrObs); }
      .cicd { stroke:#b45309; stroke-width:2.2; fill:none; marker-end:url(#arrCi); }
      .legend { fill:#ffffff; stroke:#94a3b8; stroke-width:1.2; rx:8; }
    </style>
    <marker id="arrData" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#1d4ed8"/></marker>
    <marker id="arrCtrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0f766e"/></marker>
    <marker id="arrObs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/></marker>
    <marker id="arrCi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b45309"/></marker>
  </defs>

  <rect x="20" y="20" width="1960" height="1740" class="bg"/>
  <text x="50" y="68" class="title">Ti Garantias - Arquitectura Tecnica Detallada (v2.1)</text>
  <text x="50" y="94" class="tx">Suscripcion: Suscripcion de Azure 1 | Rutas separadas por tipo de flujo</text>

  <!-- LANE 1: SUBSCRIPTION -->
  <rect x="50" y="120" width="1900" height="220" class="lane" fill="#eef2ff"/>
  <text x="70" y="152" class="h2">1) Suscripcion y Resource Groups</text>

  <rect x="70" y="172" width="430" height="140" class="card"/>
  <image href="icons/azure/resource-groups.svg" x="72" y="190" width="16" height="16"/>
  <text x="88" y="202" class="h3">rg-ti-garantias-tfstate</text>
  <text x="88" y="224" class="tx">Storage Account: sttigarantiastfstate01</text>
  <text x="88" y="246" class="tx">Uso: Terraform backend state</text>

  <rect x="520" y="172" width="380" height="140" class="card"/>
  <image href="icons/azure/network-watcher.svg" x="522" y="190" width="16" height="16"/>
  <text x="538" y="202" class="h3">NetworkWatcherRG</text>
  <text x="538" y="224" class="tx">NetworkWatcher_eastus</text>
  <text x="538" y="246" class="tx">NetworkWatcher_centralus</text>

  <rect x="920" y="172" width="470" height="140" class="card"/>
  <image href="icons/azure/vm.svg" x="922" y="190" width="16" height="16"/>
  <text x="938" y="202" class="h3">tigarantias-shared-rg</text>
  <text x="938" y="224" class="tx">VNet, NSG, Public IP, NIC, VM Jenkins</text>
  <text x="938" y="246" class="tx">Disk y extension AAD SSH</text>

  <rect x="1410" y="172" width="520" height="140" class="card"/>
  <image href="icons/azure/resource-groups.svg" x="1412" y="190" width="16" height="16"/>
  <text x="1428" y="202" class="h3">tigarantias-{env}-rg</text>
  <text x="1428" y="224" class="tx">CA Frontend/Backend, Managed Env, Key Vault</text>
  <text x="1428" y="246" class="tx">Managed Identity, PostgreSQL, Storage, LAW ({env}=dev|test|prod)</text>

  <!-- LANE 2: RUNTIME -->
  <rect x="50" y="360" width="1900" height="300" class="lane" fill="#eff6ff"/>
  <text x="70" y="392" class="h2">2) Runtime de aplicacion (carril azul)</text>

  <rect x="90" y="430" width="250" height="110" class="card"/>
  <text x="108" y="462" class="h3">Usuarios / Browser</text>
  <text x="108" y="484" class="tx">Acceso por internet</text>

  <rect x="390" y="430" width="330" height="110" class="card"/>
  <image href="icons/azure/container-app.svg" x="392" y="450" width="16" height="16"/>
  <text x="408" y="462" class="h3">Container App Frontend</text>
  <text x="408" y="484" class="tx">tigarantias-{env}-fe (public ingress :80)</text>
  <text x="408" y="506" class="tx">BACKEND_UPSTREAM -> tigarantias-{env}-be</text>

  <rect x="770" y="430" width="330" height="110" class="card"/>
  <image href="icons/azure/container-app.svg" x="772" y="450" width="16" height="16"/>
  <text x="788" y="462" class="h3">Container App Backend</text>
  <text x="788" y="484" class="tx">tigarantias-{env}-be (internal :8080)</text>
  <text x="788" y="506" class="tx">API y logica de negocio</text>

  <rect x="1150" y="430" width="300" height="110" class="card"/>
  <image href="icons/azure/postgresql.svg" x="1152" y="450" width="16" height="16"/>
  <text x="1168" y="462" class="h3">PostgreSQL Flexible</text>
  <text x="1168" y="484" class="tx">tigarantias-{env}-pg-{suffix}</text>
  <text x="1168" y="506" class="tx">Persistencia de datos</text>

  <rect x="1500" y="430" width="420" height="110" class="card"/>
  <text x="1518" y="462" class="h3">Endpoint publico FE</text>
  <text x="1518" y="484" class="tx">tigarantias-{env}-fe.*.azurecontainerapps.io</text>
  <text x="1518" y="506" class="tx">Entrada para usuarios externos</text>

  <!-- Data lines (separate top channel to avoid crossing cards) -->
  <path d="M340 485 L390 485" class="data"/>
  <path d="M720 485 L770 485" class="data"/>
  <path d="M1100 485 L1150 485" class="data"/>
  <path d="M1500 455 L1500 395 L555 395 L555 430" class="data"/>
  <text x="500" y="474" class="tx">/api proxy</text>
  <text x="1160" y="386" class="tx">FQDN publico del frontend</text>

  <!-- LANE 3: SECURITY -->
  <rect x="50" y="680" width="1900" height="280" class="lane" fill="#ecfeff"/>
  <text x="70" y="712" class="h2">3) Seguridad y secretos (carril verde)</text>

  <rect x="260" y="760" width="340" height="130" class="card"/>
  <image href="icons/azure/managed-identity.svg" x="262" y="780" width="16" height="16"/>
  <text x="278" y="792" class="h3">Managed Identity</text>
  <text x="278" y="814" class="tx">tigarantias-{env}-ca-mi</text>
  <text x="278" y="836" class="tx">Lectura de secretos en Key Vault</text>

  <rect x="720" y="760" width="360" height="130" class="card"/>
  <image href="icons/azure/key-vault.svg" x="722" y="780" width="16" height="16"/>
  <text x="738" y="792" class="h3">Key Vault</text>
  <text x="738" y="814" class="tx">tigarantias{env}{suffix}kv</text>
  <text x="738" y="836" class="tx">connection-string, jwt-secret</text>
  <text x="738" y="858" class="tx">registry-password</text>

  <rect x="1200" y="760" width="380" height="130" class="card"/>
  <text x="1218" y="792" class="h3">Consumo de secretos</text>
  <text x="1218" y="814" class="tx">Container App Backend + Frontend</text>
  <text x="1218" y="836" class="tx">secretRef y pull de imagen</text>

  <path d="M600 825 L720 825" class="ctrl"/>
  <path d="M1080 825 L1200 825" class="ctrl"/>
  <path d="M1330 760 L1330 620 L935 620 L935 540" class="ctrl"/>
  <path d="M1390 760 L1390 585 L555 585 L555 540" class="ctrl"/>
  <text x="1110" y="610" class="tx">BE secrets</text>
  <text x="920" y="575" class="tx">FE secrets</text>

  <!-- LANE 4: OBSERVABILITY -->
  <rect x="50" y="980" width="1900" height="360" class="lane" fill="#f5f3ff"/>
  <text x="70" y="1012" class="h2">4) Observabilidad (carril morado) - stack en VM shared-rg</text>

  <rect x="110" y="1050" width="320" height="110" class="card"/>
  <image href="icons/azure/container-app-env.svg" x="112" y="1070" width="16" height="16"/>
  <text x="128" y="1082" class="h3">Managed Environment</text>
  <text x="128" y="1104" class="tx">tigarantias-{env}-cae</text>
  <text x="128" y="1126" class="tx">Hostea FE y BE</text>

  <rect x="470" y="1050" width="320" height="110" class="card"/>
  <image href="icons/azure/log-analytics.svg" x="472" y="1070" width="16" height="16"/>
  <text x="488" y="1082" class="h3">Log Analytics Workspace</text>
  <text x="488" y="1104" class="tx">tigarantias-{env}-law</text>
  <text x="488" y="1126" class="tx">Logs de Container Apps</text>

  <rect x="880" y="1050" width="250" height="110" class="card"/>
  <text x="898" y="1082" class="h3">Prometheus</text>
  <text x="898" y="1104" class="tx">ti-garantias-prometheus</text>
  <text x="898" y="1126" class="tx">Puerto 9090 | scrape metrics</text>

  <rect x="1160" y="1050" width="250" height="110" class="card"/>
  <text x="1178" y="1082" class="h3">Grafana</text>
  <text x="1178" y="1104" class="tx">ti-garantias-grafana</text>
  <text x="1178" y="1126" class="tx">Puerto 3000 | dashboards</text>

  <rect x="1440" y="1050" width="220" height="110" class="card"/>
  <text x="1458" y="1082" class="h3">Loki</text>
  <text x="1458" y="1104" class="tx">ti-garantias-loki</text>
  <text x="1458" y="1126" class="tx">Agregacion de logs</text>

  <rect x="1680" y="1050" width="250" height="110" class="card"/>
  <text x="1698" y="1082" class="h3">Promtail + cAdvisor</text>
  <text x="1698" y="1104" class="tx">ti-garantias-promtail / ti-garantias-cadvisor</text>
  <text x="1698" y="1126" class="tx">Logs + metricas host/contenedores VM</text>

  <path d="M430 1105 L470 1105" class="obs"/>
  <path d="M1130 1105 L1160 1105" class="obs"/>
  <path d="M1680 1138 L1660 1138" class="obs"/>
  <path d="M1805 1050 L1805 1028 L1005 1028 L1005 1050" class="obs"/>
  <path d="M1005 1050 L1005 1018 L505 1018 L505 540" class="obs"/>
  <text x="760" y="1008" class="tx">Prometheus consulta /metrics del frontend publico</text>
  <text x="1185" y="1094" class="tx">Grafana consulta metricas</text>
  <text x="1450" y="1038" class="tx">Promtail envia logs a Loki</text>
  <text x="1360" y="1018" class="tx">cAdvisor envia metricas a Prometheus</text>

  <!-- LANE 5: CICD -->
  <rect x="50" y="1360" width="1900" height="230" class="lane" fill="#fff7ed"/>
  <text x="70" y="1392" class="h2">5) CI/CD y despliegue (carril naranja)</text>

  <rect x="90" y="1420" width="280" height="130" class="card"/>
  <text x="108" y="1452" class="h3">Repositorio Git</text>
  <text x="108" y="1474" class="tx">Codigo, ramas, Jenkinsfile</text>

  <rect x="420" y="1420" width="360" height="130" class="card"/>
  <image href="icons/azure/vm.svg" x="422" y="1440" width="16" height="16"/>
  <text x="438" y="1452" class="h3">VM Jenkins + Container</text>
  <text x="438" y="1474" class="tx">Build, test, docker push</text>
  <text x="438" y="1496" class="tx">terraform plan/apply</text>
  <text x="438" y="1518" class="tx">IP priv 10.40.1.4 | pub 74.249.157.233</text>

  <rect x="830" y="1420" width="300" height="130" class="card"/>
  <text x="848" y="1452" class="h3">Docker Hub</text>
  <text x="848" y="1474" class="tx">Imagenes backend/frontend</text>

  <rect x="1180" y="1420" width="330" height="130" class="card"/>
  <image href="icons/azure/storage-account.svg" x="1182" y="1440" width="16" height="16"/>
  <text x="1198" y="1452" class="h3">Terraform State</text>
  <text x="1198" y="1474" class="tx">sttigarantiastfstate01</text>
  <text x="1198" y="1496" class="tx">Backend remoto</text>

  <rect x="1560" y="1420" width="370" height="130" class="card"/>
  <image href="icons/azure/subscription.svg" x="1562" y="1440" width="16" height="16"/>
  <text x="1578" y="1452" class="h3">Azure target</text>
  <text x="1578" y="1474" class="tx">shared-rg + {env}-rg</text>
  <text x="1578" y="1496" class="tx">Actualizacion de recursos</text>

  <path d="M370 1482 L420 1482" class="cicd"/>
  <path d="M780 1482 L830 1482" class="cicd"/>
  <path d="M560 1550 L560 1600 L1745 1600 L1745 1550" class="cicd"/>
  <path d="M640 1550 L640 1580 L1345 1580 L1345 1550" class="ctrl"/>
  <path d="M1735 1420 L1735 1395 L1938 1395 L1938 372 L935 372 L935 430" class="cicd"/>
  <path d="M1755 1420 L1755 1375 L1948 1375 L1948 348 L555 348 L555 430" class="cicd"/>
  <text x="1838" y="980" class="tx">deploy FE/BE</text>

  <!-- LEGEND -->
  <rect x="1480" y="1610" width="470" height="120" class="legend"/>
  <text x="1500" y="1640" class="h3">Leyenda</text>
  <line x1="1500" y1="1664" x2="1580" y2="1664" class="data"/><text x="1590" y="1668" class="tx">Datos runtime</text>
  <line x1="1500" y1="1688" x2="1580" y2="1688" class="ctrl"/><text x="1590" y="1692" class="tx">Control y secretos</text>
  <line x1="1500" y1="1712" x2="1580" y2="1712" class="obs"/><text x="1590" y="1716" class="tx">Observabilidad (Grafana incluida)</text>
  <line x1="1730" y1="1664" x2="1810" y2="1664" class="cicd"/><text x="1820" y="1668" class="tx">CI/CD</text>
  <text x="50" y="1668" class="tx">Leyenda informativa: lee de izquierda a derecha por cada carril.</text>
  <text x="50" y="1690" class="tx">Azul=runtime, Verde=secretos, Morado=observabilidad, Naranja=despliegue.</text>
  <text x="50" y="1712" class="tx">FQDN = Fully Qualified Domain Name, es decir, la URL o dominio completo del servicio.</text>
  <text x="50" y="1734" class="tx">Dependencias criticas: Key Vault + Managed Identity + Docker Hub + TF state.</text>
  <text x="50" y="1754" class="tx">Patron: tigarantias-{env}-rg | {env}=dev|test|prod | {suffix}=tgd1|tgt1|tgp1.</text>
</svg>
